<form id="myForm" class="borderless rounded" onsubmit="handleFormSubmit(this)"> 
    <input type="text" id="RecId" name="RecId" value="" style="display: none">

<div class="row">
		<div class="form-group col-md-12 mb-2">
		<label><i class="fa-solid fa-circle-user"></i> กิจกรรม</label>
		<input type="text" class="form-control" id="name" name="name" placeholder="กิจกรรม" required>
	</div>

		<div class="form-group col-md-12 mb-2">
			<label><i class="fa-solid fa-calendar-days"></i> กำหนดงาน</label>
			<input type="date" class="form-control" id="dateOfBirth" name="dateOfBirth" required>
		</div>

		<div class="form-group col-md-12 mb-2">
      		<label><i class="fa-solid fa-envelope"></i> รายละเอียด</label>
		<textarea class="form-control" id="msg" name="msg" placeholder="รายละเอียด" style="height: 140px;" required></textarea>
		</div>

    </div>

	<button type="submit" id="btn1" class="btn btn-primary btn-lg col-12 mb-2"><i class="fa-sharp fa-solid fa-cloud-arrow-down"></i> บันทึก</button>
  <button class="btn btn-primary btn-lg col-12 mb-2" type="button" id="btn2" style="display:none" disabled>
  <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
  Loading...
</button>  
       <div id="message"></div>
</form>
