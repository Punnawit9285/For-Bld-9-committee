//EDIT DATA
function editData(id){
  let recordId = id;
  
  // Prompt user to enter password
  Swal.fire({
    title: 'Enter Password',
    input: 'password',
    inputPlaceholder: 'Enter password : xxxx',
    inputAttributes: {
      autocapitalize: 'off'
    },
    showCancelButton: true,
    confirmButtonText: 'แก้ไขข้อมูล',
    showLoaderOnConfirm: true,
    preConfirm: (password) => {
      // Check if password is correct
      if (password === '9969') {
        // Password is correct, open the modal and fetch the record
        $('#staticBackdrop').modal('show');
        google.script.run.withSuccessHandler(populateForm).getRecordById(recordId);
      } else {
        // Password is incorrect, show error message
        Swal.showValidationMessage('รหัสผ่านไม่ถูกต้อง');
      }
    },
    allowOutsideClick: () => !Swal.isLoading()
  });
}



function delData(id){
    let recordId = id

      icon: 'info',
      text: 'Loading..',
      showConfirmButton: false,
      })
    Swal.showLoading()
    google.script.run.withSuccessHandler(deleteData).getRecordById(recordId);
  }
