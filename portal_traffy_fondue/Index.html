<!DOCTYPE html>
<html>
  <head>
    <title>Button Links</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        color: #548c21;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-image: url('https://blogger.googleusercontent.com/img/a/AVvXsEj8AxfUPSnwoWqkJdXo818IhQz8d7IxFsP1HrTu1kYPKYTkICymiiohQwQA2E-5iK-YEgic1R1bMt9byMqO90Y_7LDqCEQBVO_XDHxW_o_tLIHBfrp7Mmi4DL7qehNMf0EaVkweFZCq3ila3gVl10gIodoufBcpSZY0QPZWssi0cmvGhGsycEcDCf8wNc4z');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        padding: 20px;
      }

      .logo-title-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 50px;
      }

      .logo {
        width: 250px; /* Increased logo size */
        margin-bottom: 20px;
      }

      .title {
        font-size: 36px;
        font-weight: bold;
        color: #548c21;
        margin-bottom: 50px;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 30px;
        align-items: center;
        width: 100%;
      }

      .button-link {
        padding: 40px;
        font-family: Impact;
        font-size: 36px;
        color: white;
        text-align: center;
        text-decoration: none;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        transition: background-color 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        background-size: cover;
        background-position: center;
        width: 300px;
        height: 150px;
      }

      .button-link:hover {
        background-color: rgba(0, 0, 0, 0.5);
      }

      .button-1 {
        background-image: url('https://plus.unsplash.com/premium_photo-1680302397750-ef86e280a172?fm=jpg&q=60&w=3000&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8cHJvYmxlbXxlbnwwfHwwfHx8MA%3D%3D');
      }

      .button-2 {
        background-image: url('https://media.istockphoto.com/id/1768217932/vector/multiple-destinations-gps-tracking-map-track-navigation-pins-on-street-maps-navigate-mapping.jpg?s=612x612&w=0&k=20&c=6O3Hgw29yP5KoqWduJ3EYSWgKr72ftE1fO7UVQX8ME4=');
      }

      /* Mobile Styles */
      @media (max-width: 768px) {
        .logo {
          width: 150px; /* Adjusted logo size for mobile */
        }

        .title {
          font-size: 28px;
          margin-bottom: 30px;
        }

        .container {
          gap: 75px;
        }

        .button-link {
          width: 250px;
          height: 100px;
          font-size: 28px;
          padding: 45px;
        }
      }
    </style>
    <script>
      // JavaScript to handle button clicks
      function openLink(url) {
        window.open(url, "_blank");
      }
    </script>
  </head>
  <body>
    <!-- Logo and Title in the center -->
    <div class="logo-title-container">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhqpeiVtcnTNcK-ZlIARqHkQIUtE5DYl8uIx-F0VvKiT0E_vasdC6hlWQCGgF7Pve1QFoHzFMNxlVBkf9k4FnyuMCmlS8VBm36U1HQzcWx3yBnIMlu5drlIBkTGr7O8AFrrT3q4O0g_R1CzY9QOd7Ee00oykLzmYvuWSnQV2ADcciSseJBS7VSwWyk0vG2H/s1207/IMG_0806.PNG" alt="Logo" class="logo">
      <div class="title">รายงานปัญหา เเละข้อเสนอภายในตึก 9</div>
    </div>

    <div class="container">
      <div class="button-link button-1" onclick="openLink('https://docs.google.com/forms/d/e/1FAIpQLScL9gl4pF5gPRFXNDT3bv-_zBc4diyLAY7-iG89psZQQ28YAg/viewform?usp=sf_link')">รายงานปัญหา หรือ ข้อเสนอ</div>
      <div class="button-link button-2" onclick="openLink('https://script.google.com/macros/s/AKfycbwhQ3etekF6pZ-sJy4vQo7tD3t4N9vAymi3dAleRtPwrr_LzQy3KdqzaHXzHBpVZFVm/exec')">ติดตามสถานะการดำเนินการ</div>
    </div>
  </body>
</html>
